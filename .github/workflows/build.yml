name: Build

on:
  push:
    branches: [main]
    tags: ['v*']

# Anuleaza build-ul in curs cand vine un push nou (evita rulari duplicate + conflict cache binfmt)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci-skip]')"
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64
          cache-image: false  # nu cache-ui binfmt -> elimina warning 'Unable to reserve cache'

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/whmcs
          tags: |
            type=semver,pattern={{raw}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      # buildx bake CLI direct (fara docker/bake-action care e node20)
      - name: Build & push (bake)
        env:
          PUSH_FLAG: ${{ github.event_name != 'pull_request' && '--push' || '' }}
        run: |
          docker buildx bake \
            -f ./docker-bake.hcl \
            -f "${{ steps.meta.outputs.bake-file }}" \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --set "image.args.BUILD_DATE=${{ github.run_id }}" \
            $PUSH_FLAG \
            publish
